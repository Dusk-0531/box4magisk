name: release

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: '更新日志 (Release Notes)'
        required: false
        type: string
        default: ''
      mihomo_version:
        description: 'mihomo 版本号 (留空使用最新 Prerelease-Alpha)'
        required: false
        type: string
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build webui
        run: bun run build

      - name: Download mihomo ARMV8 core
        run: |
          MIHOMO_VERSION="${{ inputs.mihomo_version }}"
          if [ -z "$MIHOMO_VERSION" ]; then
            MIHOMO_VERSION="Prerelease-Alpha"
            echo "No version specified, using latest $MIHOMO_VERSION..."
          else
            echo "Using specified version: $MIHOMO_VERSION..."
          fi
          echo "Downloading mihomo ARMV8 core from vernesong/mihomo (version: $MIHOMO_VERSION)..."
          MIHOMO_ASSET_NAME=$(curl -sSL "https://api.github.com/repos/vernesong/mihomo/releases/tags/${MIHOMO_VERSION}" | jq -r '.assets[] | select(.name | test("^mihomo-android-arm64-v8[a-zA-Z0-9._-]*\\.gz$")) | .name' | head -1)
          if [ -n "$MIHOMO_ASSET_NAME" ] && echo "$MIHOMO_ASSET_NAME" | grep -qE '^mihomo-android-arm64-v8[a-zA-Z0-9._-]*\.gz$'; then
            MIHOMO_DOWNLOAD_URL="https://github.com/vernesong/mihomo/releases/download/${MIHOMO_VERSION}/${MIHOMO_ASSET_NAME}"
            echo "Downloading $MIHOMO_ASSET_NAME..."
            curl -sSL -o mihomo.gz "$MIHOMO_DOWNLOAD_URL"
            gunzip -c mihomo.gz > box/bin/mihomo
            chmod +x box/bin/mihomo
            rm -f mihomo.gz
            echo "mihomo ARMV8 core downloaded and installed successfully."
          else
            echo "Failed to find valid mihomo ARMV8 asset for version: $MIHOMO_VERSION"
            exit 1
          fi
      - name: Download and translate box.tproxy
        run: |
          echo "Downloading tproxy.sh from CHIZI-0618/AndroidTProxyShell..."
          curl -sSL -o box/scripts/box.tproxy "https://raw.githubusercontent.com/CHIZI-0618/AndroidTProxyShell/main/tproxy.sh"
          python .github/scripts/translate_tproxy.py box/scripts/box.tproxy
          chmod +x box/scripts/box.tproxy

      - name: Run build.sh
        run: sh build.sh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: box4_v*.zip
          body: ${{ inputs.changelog }}
          generate_release_notes: ${{ inputs.changelog == '' }}
