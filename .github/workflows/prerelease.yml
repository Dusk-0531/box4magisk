name: prerelease

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - ".github"
      - "README.md"
    tags-ignore:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch and update box.tproxy
        run: |
          curl -fsSL "https://raw.githubusercontent.com/CHIZI-0618/AndroidTProxyShell/main/tproxy.sh" -o /tmp/tproxy.sh
          sed -e 's/\bstart_proxy\b/enable_proxy/g' \
              -e 's/\bstop_proxy\b/disable_proxy/g' \
              -e 's/start | stop | restart/enable | disable | restart/g' \
              -e 's/{start|stop|restart}/{enable|disable|restart}/g' \
              -e 's/^\(\s*\)start)/\1enable)/g' \
              -e 's/^\(\s*\)stop)/\1disable)/g' \
              /tmp/tproxy.sh > box/scripts/box.tproxy
          chmod +x box/scripts/box.tproxy

      - name: Run build.sh
        run: sh build.sh

      - name: Delete current prerelease assets
        uses: andreaswilli/delete-release-assets-action@v3.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: Prerelease
          deleteOnlyFromDrafts: false

      - name: Tag Repo
        uses: richardsimko/update-tag@v1
        with:
          tag_name: Prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Prerelease
        uses: softprops/action-gh-release@v1
        if: ${{ success() }}
        with:
          tag: Prerelease
          tag_name: Prerelease
          files: box4_v*.zip
          prerelease: true
          generate_release_notes: true
